<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ParaView Protein Visualization Demo</title>
  <meta name="description" content="ParaView for protein visualization: GroEL cryo-EM density and lysozyme APBS electrostatics, ~22 seconds at 1080p." />
  <meta property="og:title" content="ParaView Protein Visualization Demo" />
  <meta property="og:description" content="GroEL cryo-EM density · Lysozyme APBS electrostatics. Regenerable end-to-end from scripts." />
  <meta property="og:video" content="https://gsmurphy.github.io/paraview-protein-demo/out/demo.mp4" />
  <meta property="og:video:type" content="video/mp4" />
  <meta property="og:video:width" content="1920" />
  <meta property="og:video:height" content="1080" />
  <style>
    :root { color-scheme: dark; }
    html, body {
      margin: 0; padding: 0;
      background: #050507;
      color: #d8dde6;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-weight: 300;
      min-height: 100%;
    }
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 6vh 24px 4vh;
    }
    h1 {
      font-weight: 200;
      font-size: clamp(1.6rem, 2.6vw, 2.2rem);
      letter-spacing: 0.01em;
      margin: 0 0 0.4em;
    }
    p.lede {
      color: #99a0ad;
      margin: 0 0 2.2em;
      font-size: clamp(0.95rem, 1.2vw, 1.05rem);
    }
    .video-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #000;
      border: 1px solid #1a1c22;
      border-radius: 6px;
      overflow: hidden;
    }
    video {
      width: 100%; height: 100%;
      display: block;
      background: #000;
    }
    footer {
      margin-top: 2em;
      color: #6b727f;
      font-size: 0.9rem;
      display: flex;
      gap: 1.5em;
      flex-wrap: wrap;
    }
    footer a {
      color: #b8c0cc;
      text-decoration: none;
      border-bottom: 1px solid #2a2d36;
    }
    footer a:hover { color: #fff; border-bottom-color: #6b727f; }
  </style>
</head>
<body>
  <main>
    <h1>ParaView Protein Visualization Demo</h1>
    <p class="lede">GroEL cryo-EM density (EMD-5001 + PDB 3CAU) and lysozyme APBS electrostatics (PDB 1AKI), rendered headlessly with <code>pvbatch</code> and assembled with ffmpeg.</p>
    <div class="video-wrap">
      <video controls preload="metadata" playsinline poster="" src="out/demo.mp4"></video>
    </div>
    <footer>
      <a href="https://github.com/gsmurphy/paraview-protein-demo">Source on GitHub</a>
      <a href="out/demo.mp4" download>Download MP4 (10 MB)</a>
    </footer>
  </main>
</body>
</html>
